[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "de-slop-cli"
version = "1.0.0"
description = "Detect and remove AI-generated writing patterns (slop) from text and documentation"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = ["click>=8.0"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]

[project.scripts]
de-slop = "de_slop_cli.cli:main"
