name: Cortex Evaluation Pipeline

on:
  push:
    paths:
      - 'cortex/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'cortex/**'
      - 'tests/**'

permissions:
  contents: read

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pyyaml

      - name: Run unit tests
        run: |
          pytest tests/unit/ -v --tb=short --cov=cortex --cov-report=xml

      - name: Run integration tests
        run: |
          pytest tests/integration/ -v --tb=short

      - name: Run smoke test
        run: |
          python scripts/smoke_test.py

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tools
        run: |
          pip install ruff mypy pyyaml

      - name: Ruff lint
        run: ruff check cortex/ tests/

      - name: Ruff format check
        run: ruff format --check cortex/ tests/

  synthetic-data:
    name: Dataset Generation Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Generate test dataset
        run: |
          python scripts/generate_dataset.py --count 50 --seed 42 --output /tmp/test_datasets

      - name: Verify dataset integrity
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          base = Path('/tmp/test_datasets')
          categories = [d for d in base.iterdir() if d.is_dir() and (d / 'index.json').exists()]
          total = 0
          for cat in categories:
              index = json.loads((cat / 'index.json').read_text())
              total += index['total_prompts']
              print(f'{cat.name}: {index[\"total_prompts\"]} prompts in {index[\"shard_count\"]} shards')
          print(f'Total: {total} prompts across {len(categories)} categories')
          assert total > 0, 'No prompts generated'
          print('Dataset integrity check passed')
          "

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install bandit

      - name: Run Bandit SAST scan
        run: |
          bandit -r cortex/ -f json -o bandit-report.json --severity-level medium || true
          bandit -r cortex/ --severity-level high
