// SEEDED PRNG (Mulberry32 — deterministic per seed)
function m32(a){return()=>{a|=0;a=(a+0x6d2b79f5)|0;let t=Math.imul(a^(a>>>15),1|a);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296}}
function sG(r,m=0,s=1){const u=r(),v=r();return m+s*Math.sqrt(-2*Math.log(u||1e-10))*Math.cos(6.2831853*v)}

// EVOLUTION ENGINE v2 — 10K gen support
// C1 FIX: Red Queen decay + paradigm shifts + carrying capacity + innovation bursts
// C2 FIX: Samples every Nth gen (max ~2000 stored frames)
function evolve(total, seed, mR, sP, cF){
  const r=m32(seed);
  const sRate=total<=2000?1:Math.ceil(total/2000);
  const pop=SK.map(sk=>({...sk,f:Math.max(0.15,Math.min(0.65,0.30+sG(r,0.08,0.06))),b:0,m:0,pA:"",pB:"",x:0.15+r()*0.7,y:0.15+r()*0.7,vx:(r()-0.5)*0.002,vy:(r()-0.5)*0.002}));
  let ceiling=0.72, nextShift=800+Math.floor(r()*600), decay=0.0003;
  const log=[];
  const snap=()=>pop.map(p=>({...p}));
  const st=()=>{const fs=pop.map(p=>p.f);return{mn:fs.reduce((a,b)=>a+b)/fs.length,mx:Math.max(...fs),mi:Math.min(...fs)}};
  const s0=st();
  log.push({g:0,sk:snap(),ev:[],mn:+s0.mn.toFixed(4),mx:+s0.mx.toFixed(4),mi:+s0.mi.toFixed(4),top:pop.reduce((a,b)=>a.f>b.f?a:b).id});

  for(let g=1;g<=total;g++){
    const ev=[];
    const sorted=[...pop].sort((a,b)=>b.f-a.f);
    // Red Queen
    pop.forEach(p=>{p.f=Math.max(0.06,p.f-decay)});
    // Paradigm shift
    if(g>=nextShift){
      ceiling=0.50+r()*0.40;
      nextShift=g+700+Math.floor(r()*1300);
      decay=0.0002+r()*0.0005;
      pop.forEach(p=>{p.f=Math.max(0.08,p.f-(0.04+r()*0.14))});
      ev.push({t:"paradigm",sk:"ecosystem",bf:0,af:+ceiling.toFixed(3)});
    }
    // Carrying capacity
    const tF=pop.reduce((a,p)=>a+p.f,0);
    const cap=27*ceiling*0.82;
    if(tF>cap){const ex=(tF-cap)/pop.length;pop.forEach(p=>{p.f=Math.max(0.06,p.f-ex*0.25)})}
    // Crossover
    if(r()<0.3&&sorted.length>=2){
      const [p1,p2]=sorted;const w=sorted[sorted.length-1];
      const wi=pop.findIndex(p=>p.id===w.id);
      const cf=Math.max(0.1,Math.min(ceiling+0.04,p1.f*0.55+p2.f*0.45+sG(r,0.01,0.01)));
      ev.push({t:"cross",sk:w.id,pA:p1.id,pB:p2.id,bf:+w.f.toFixed(4),af:+cf.toFixed(4)});
      pop[wi].f=cf;pop[wi].pA=p1.id;pop[wi].pB=p2.id;pop[wi].b=g;pop[wi].m=0;
    }
    // Mutation
    const nM=Math.max(1,Math.floor(pop.length*sP));
    for(const c of sorted.slice(-nM)){
      const i=pop.findIndex(p=>p.id===c.id);const old=pop[i].f;
      const hr=ceiling-pop[i].f;const ic=Math.max(0.2,hr/ceiling);
      if(r()<ic){
        let d=sG(r,0.01,0.007)*hr*(1+mR);
        if(r()<0.02) d+=0.06+r()*0.10; // Innovation burst
        pop[i].f=Math.max(0.06,Math.min(ceiling+0.04,pop[i].f+d));
      }else{pop[i].f=Math.max(0.06,Math.min(ceiling+0.04,pop[i].f+sG(r,-0.005,0.004)))}
      pop[i].m++;const d=pop[i].f-old;
      if(Math.abs(d)>0.003) ev.push({t:"mut",sk:pop[i].id,bf:+old.toFixed(4),af:+pop[i].f.toFixed(4),d:+d.toFixed(4)});
    }
    // Env shift
    if(g%10===0){const l=pop[Math.floor(r()*pop.length)];const old=l.f;l.f=Math.min(ceiling+0.03,l.f+sG(r,0.018,0.01));ev.push({t:"env",sk:l.id,bf:+old.toFixed(4),af:+l.f.toFixed(4)})}
    // Extinction
    if(g%cF===0&&g>0){const w=sorted[sorted.length-1];const wi=pop.findIndex(p=>p.id===w.id);const old=pop[wi].f;pop[wi].f=Math.max(0.08,Math.min(0.4,0.18+sG(r,0.05,0.03)));pop[wi].b=g;pop[wi].m=0;ev.push({t:"ext",sk:w.id,bf:+old.toFixed(4),af:+pop[wi].f.toFixed(4)})}
    // Physics
    pop.forEach(p=>{const tY=0.88-p.f*0.75;p.vy+=(tY-p.y)*0.004+sG(r,0,0.0002);p.vx+=sG(r,0,0.0003);p.vx*=0.95;p.vy*=0.95;p.x+=p.vx;p.y+=p.vy;p.x=Math.max(0.04,Math.min(0.96,p.x));p.y=Math.max(0.04,Math.min(0.96,p.y))});
    // Sample (C2 fix)
    if(g%sRate===0||g===total||ev.some(e=>e.t==="ext"||e.t==="cross"||e.t==="paradigm")){
      const s=st();log.push({g,sk:snap(),ev,mn:+s.mn.toFixed(4),mx:+s.mx.toFixed(4),mi:+s.mi.toFixed(4),top:pop.reduce((a,b)=>a.f>b.f?a:b).id});
    }
  }
  return log;
}

function buildJudgePrompt(fd){
  const t5=[...fd.sk].sort((a,b)=>b.f-a.f).slice(0,5);
  const b3=[...fd.sk].sort((a,b)=>a.f-b.f).slice(0,3);
  return `You are an AI evolution judge. Evaluate this skill ecosystem snapshot.

Generation: ${fd.g}
Mean fitness: ${fd.mn}, Max: ${fd.mx}, Min: ${fd.mi}
Top 5: ${t5.map((s,i)=>`${i+1}. ${s.id} (${s.f.toFixed(3)})`).join(", ")}
Bottom 3: ${b3.map(s=>`${s.id} (${s.f.toFixed(3)})`).join(", ")}
Events this generation: ${fd.ev.length}

Rate ecosystem health from 0.0 to 1.0. Respond with ONLY this exact JSON format, nothing else:
{"score": 0.XX, "note": "brief assessment max 12 words"}`;
}

function extractJSON(text){
  if(!text)return null;
  text=text.trim();
  // Strip markdown code fences (```json ... ``` or ``` ... ```)
  const fenced=text.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(fenced)text=fenced[1].trim();
  // Strip leading/trailing prose around JSON
  text=text.replace(/^[^{]*(?={)/, '').replace(/}[^}]*$/, '}');
  // Find first balanced { ... } block (handles nested braces)
  const si=text.indexOf("{");if(si===-1)return tryRegexFallback(text);
  let depth=0,ei=-1;for(let i=si;i<text.length;i++){if(text[i]==="{")depth++;if(text[i]==="}")depth--;if(depth===0){ei=i;break}}
  if(ei===-1)return tryRegexFallback(text);
  const raw=text.slice(si,ei+1);
  // Try parsing, with fallback for common LLM quirks
  const candidates=[
    raw,
    raw.replace(/,\s*}/g,'}').replace(/,\s*]/g,']'), // trailing commas
    raw.replace(/'/g,'"'), // single quotes
    raw.replace(/(\w+)\s*:/g,'"$1":'), // unquoted keys
  ];
  for(const c of candidates){
    try{
      const obj=JSON.parse(c);
      return normalizeJudgeResult(obj);
    }catch(e){}
  }
  return tryRegexFallback(text);
}

function normalizeJudgeResult(obj){
  // Direct score field
  if(typeof obj.score==="number")return{score:Math.max(0,Math.min(1,obj.score)),note:String(obj.note||obj.assessment||obj.comment||obj.explanation||"").slice(0,120)};
  // String score (LLMs sometimes quote numbers)
  if(typeof obj.score==="string"&&!isNaN(+obj.score))return{score:Math.max(0,Math.min(1,+obj.score)),note:String(obj.note||obj.assessment||"").slice(0,120)};
  // Alternate key names from various LLMs
  const altKeys=["health_score","health","rating","ecosystem_health","fitness","ecosystem_score","overall_score","evaluation"];
  for(const k of altKeys){
    const v=obj[k];
    if(typeof v==="number")return{score:Math.max(0,Math.min(1,v)),note:String(obj.note||obj.assessment||obj.comment||obj.explanation||obj.summary||"").slice(0,120)};
    if(typeof v==="string"&&!isNaN(+v))return{score:Math.max(0,Math.min(1,+v)),note:String(obj.note||obj.assessment||"").slice(0,120)};
  }
  return null;
}

function tryRegexFallback(text){
  // Last resort: extract score from unstructured text like "Score: 0.75" or "health: 0.8"
  const m=text.match(/(?:score|health|rating|fitness)\s*[:=]\s*(0?\.\d+|1\.0|[01])/i);
  if(m){
    const score=Math.max(0,Math.min(1,parseFloat(m[1])));
    // Try to extract a note from remaining text
    const noteM=text.match(/(?:note|assessment|comment)\s*[:=]\s*"?([^"}\n]{3,60})"?/i);
    return{score,note:noteM?noteM[1].trim():"LLM response (regex-extracted)"};
  }
  return null;
}

function syntheticJudge(fd){
  const fits=fd.sk.map(s=>s.f);
  const mean=fits.reduce((a,b)=>a+b)/fits.length;
  const std=Math.sqrt(fits.reduce((a,v)=>a+(v-mean)**2,0)/fits.length);
  const diversity=std/Math.max(mean,0.01);
  const spread=fd.mx-fd.mi;
  const convergence=1-spread;
  // Healthy ecosystem: moderate mean, good diversity, not fully converged
  const health=Math.min(0.95,Math.max(0.1,mean*0.5+diversity*1.2+(1-convergence)*0.3));
  const notes=[
    diversity>0.15?"High diversity":"Low diversity",
    mean>0.6?"Strong mean fitness":"Moderate fitness",
    spread>0.3?"Wide spread":"Tight cluster",
    fd.ev.some(e=>e.t==="paradigm")?"Post-paradigm shift":"Stable landscape",
    fd.ev.some(e=>e.t==="ext")?"Post-extinction recovery":"No recent extinction"
  ];
  const note=notes.filter((_,i)=>i<2).join(". ");
  return{score:+health.toFixed(3),note};
}

// Anthropic Claude API
async function judgeAnthropic(fd,key){
  const pr=buildJudgePrompt(fd);
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:pr}]})
  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${resp.status}`)}
  const d=await resp.json();
  return(d.content?.[0]?.text||"").trim();
}

// OpenAI-compatible API (GPT, Groq, Together, LM Studio, Ollama, custom)
async function judgeOpenAICompat(fd,key,endpoint,model,extraHeaders={}){
  const pr=buildJudgePrompt(fd);
  const headers={"Content-Type":"application/json",...extraHeaders};
  if(key)headers["Authorization"]="Bearer "+key;
  const body={model,max_tokens:200,messages:[{role:"system",content:"You are an AI evolution judge. Respond with ONLY valid JSON: {\"score\": 0.XX, \"note\": \"brief text\"}"},{role:"user",content:pr}]};
  // Add json response format for providers that support it
  if(endpoint.includes("openai.com")||endpoint.includes("groq.com")||endpoint.includes("together.xyz"))body.response_format={type:"json_object"};
  const resp=await fetch(endpoint,{method:"POST",headers,body:JSON.stringify(body)});
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${resp.status}`)}
  const d=await resp.json();
  return(d.choices?.[0]?.message?.content||d.content?.[0]?.text||"").trim();
}

const PROVIDER_CONFIGS={
  openai:{endpoint:"https://api.openai.com/v1/chat/completions",model:"gpt-4o-mini"},
  groq:{endpoint:"https://api.groq.com/openai/v1/chat/completions",model:"llama-3.3-70b-versatile"},

  lmstudio:{endpoint:"http://localhost:1234/v1/chat/completions",model:"default"},
};

async function judge(fd,provider,apiKey,customEndpoint){
  try{
    if(provider==="synthetic")return syntheticJudge(fd);

    let rawText="";
    if(provider==="anthropic"){
      rawText=await judgeAnthropic(fd,apiKey);
    }else if(PROVIDER_CONFIGS[provider]){
      const cfg=PROVIDER_CONFIGS[provider];
      const ep=(provider==="ollama"||provider==="lmstudio")&&customEndpoint?customEndpoint:cfg.endpoint;
      rawText=await judgeOpenAICompat(fd,apiKey,ep,cfg.model);
    }else if(provider==="custom"){
      rawText=await judgeOpenAICompat(fd,apiKey,customEndpoint||"http://localhost:11434/v1/chat/completions","default");
    }else{
      return syntheticJudge(fd);
    }

    // Parse with robust extractor
    const parsed=extractJSON(rawText);
    if(parsed)return parsed;

    // Fallback: synthetic score + LLM note excerpt (never show "Parse failed")
    const syn=syntheticJudge(fd);
    const snippet=rawText.replace(/[{}"]/g,'').slice(0,50).trim();
    return{score:syn.score,note:snippet||syn.note,_fallback:true};
  }catch(e){
    // Network/API errors: fall back to synthetic with error context
    const syn=syntheticJudge(fd);
    const msg=e.message||"Unknown error";
    if(msg.includes("Failed to fetch")||msg.includes("NetworkError"))return{score:syn.score,note:"Offline — "+syn.note,_fallback:true};
    return{score:syn.score,note:msg.slice(0,50),_fallback:true};
  }
}

      const w=c.width,h=c.height;frm.current++;
      ctx.fillStyle="rgba(4,4,12,0.13)";ctx.fillRect(0,0,w,h);
      if(frm.current%4===0){ctx.fillStyle="rgba(25,25,50,0.2)";for(let gx=0;gx<w;gx+=50)for(let gy=0;gy<h;gy+=50)ctx.fillRect(gx,gy,1,1)}

      const log=logR.current;
      if(!log){
        ctx.fillStyle="rgba(4,4,12,1)";ctx.fillRect(0,0,w,h);
        ctx.fillStyle="rgba(25,25,50,0.2)";for(let gx=0;gx<w;gx+=50)for(let gy=0;gy<h;gy+=50)ctx.fillRect(gx,gy,1,1);
        ctx.textAlign="center";ctx.textBaseline="middle";
        ctx.font=`bold ${w*0.03}px "JetBrains Mono",monospace`;ctx.fillStyle="#A855F7";
        ctx.fillText("CORTEX PETRI DISH",w/2,h*0.36);
        ctx.font=`${w*0.012}px "JetBrains Mono",monospace`;ctx.fillStyle="#666";
        ctx.fillText("27 AI skills \u00B7 10,000 generations \u00B7 genetic evolution",w/2,h*0.43);
        ctx.fillText("Red Queen \u00B7 paradigm shifts \u00B7 8 judge providers \u00B7 cross-platform",w/2,h*0.47);
        ctx.font=`${w*0.01}px "JetBrains Mono",monospace`;ctx.fillStyle="#444";
        ctx.fillText("Press EVOLVE to begin. Click organisms for genetic history.",w/2,h*0.53);
        SK.forEach((sk,i)=>{const a=(i/SK.length)*6.283;const rad=Math.min(w,h)*0.2;const ox=w/2+Math.cos(a)*rad,oy=h*0.5+Math.sin(a)*rad;const rr=3+Math.sin(frm.current*0.018+i)*1.5;const col=CC[sk.c]||"#888";ctx.beginPath();ctx.arc(ox,oy,rr,0,6.283);ctx.fillStyle=col+"30";ctx.fill();ctx.strokeStyle=col+"55";ctx.lineWidth=0.5;ctx.stroke()});
        return;
      }

      // Advance
      if(pR.current&&fIdxR.current<log.length-1){
        const now=performance.now();
        for(let s=0;s<spR.current&&fIdxR.current<log.length-1;s++){
          fIdxR.current++;
          const frame=log[fIdxR.current];if(!frame)break;
          gR.current=frame.g;
          for(const ev of frame.ev){
            const sk=frame.sk.find(p=>p.id===ev.sk);if(!sk)continue;
            const sx=sk.x*w,sy=sk.y*h;
            if(ev.t==="mut"&&Math.abs(ev.d||0)>0.006){pM(ev.d||0);const col=ev.d>0?"rgba(80,255,130,1)":"rgba(255,80,80,1)";for(let i=0;i<4;i++)parts.current.push(mkP(sx,sy,col,22))}
            else if(ev.t==="cross"){pC();for(let i=0;i<15;i++)parts.current.push(mkP(sx,sy,"rgba(168,85,247,1)",40))}
            else if(ev.t==="ext"){pE();for(let i=0;i<30;i++)parts.current.push(mkP(sx,sy,"rgba(255,40,40,1)",50))}
            else if(ev.t==="paradigm"){pP();for(let i=0;i<50;i++)parts.current.push(mkP(w*Math.random(),h*Math.random(),"rgba(255,200,50,1)",35))}
            evtR.current=[{...ev,g:frame.g},...evtR.current].slice(0,12);
          }
        }
        // C3 FIX: Throttle state updates
        if(now-lastSU.current>120){lastSU.current=now;setGen(gR.current);setEvts([...evtR.current]);const f=log[fIdxR.current];if(f?.sk)setLb([...f.sk].sort((a,b)=>b.f-a.f).slice(0,10))}
      }
      if(fIdxR.current>=log.length-1&&pR.current){pR.current=false;setPlaying(false);const f=log[log.length-1];setGen(f.g);setEvts([...evtR.current]);if(f?.sk)setLb([...f.sk].sort((a,b)=>b.f-a.f).slice(0,10))}

      const frame=log[Math.min(fIdxR.current,log.length-1)];if(!frame)return;

      // Draw organisms
      for(const sk of frame.sk){
        const sx=sk.x*w,sy=sk.y*h;const baseR=4+sk.f*26;const pulse=Math.sin(frm.current*0.04+sk.f*8)*2;const r=Math.max(2.5,baseR+pulse);const col=CC[sk.c]||"#888";const sat=Math.min(240,Math.floor(60+sk.m*3));const hex=sat.toString(16).padStart(2,"0");
        const g=ctx.createRadialGradient(sx,sy,0,sx,sy,r*2.5);g.addColorStop(0,col+"22");g.addColorStop(1,col+"00");ctx.beginPath();ctx.arc(sx,sy,r*2.5,0,6.283);ctx.fillStyle=g;ctx.fill();
        ctx.beginPath();ctx.arc(sx,sy,r,0,6.283);ctx.fillStyle=col+hex;ctx.fill();
        ctx.beginPath();ctx.arc(sx,sy,r*0.5,0,6.283*sk.f);ctx.strokeStyle="rgba(255,255,255,0.45)";ctx.lineWidth=1.2;ctx.stroke();
        if(r>9){ctx.font=`bold ${Math.max(6,r*0.4)}px "JetBrains Mono",monospace`;ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillStyle="rgba(255,255,255,0.8)";ctx.fillText(sk.s,sx,sy)}
        ctx.font='7px "JetBrains Mono",monospace';ctx.fillStyle="rgba(255,255,255,0.3)";ctx.textAlign="center";ctx.fillText(sk.f.toFixed(2),sx,sy+r+8);
      }
      // Particles
      parts.current=parts.current.filter(p=>p.life>0);for(const p of parts.current)drawP(ctx,p);
      // HUD
      ctx.fillStyle="#A855F7";ctx.font=`bold ${Math.max(12,w*0.015)}px "JetBrains Mono",monospace`;ctx.textAlign="left";ctx.textBaseline="top";ctx.fillText(`GEN ${gR.current.toLocaleString()}`,14,12);
      ctx.font=`${Math.max(8,w*0.008)}px "JetBrains Mono",monospace`;ctx.fillStyle="#666";ctx.fillText(`SEED ${seed}  \u2502  MEAN ${frame.mn.toFixed(3)}  \u2502  MAX ${frame.mx.toFixed(3)}  \u2502  MIN ${frame.mi.toFixed(3)}`,14,12+w*0.02);
      // Progress bar
      const bH=3,bY=h-bH-1;ctx.fillStyle="#080818";ctx.fillRect(0,bY,w,bH);
      const prog=gR.current/(total||1);const bg=ctx.createLinearGradient(0,0,w*prog,0);bg.addColorStop(0,"#A855F7");bg.addColorStop(1,"#EC4899");ctx.fillStyle=bg;ctx.fillRect(0,bY,w*prog,bH);
    };
    draw();
    return()=>{cancelAnimationFrame(id);ro.disconnect()};
  },[started,seed,total]);

  const onClick=useCallback(e=>{
    if(!logR.current||!started)return;const c=cvs.current;const rect=c.getBoundingClientRect();const sx=c.width/rect.width,sy=c.height/rect.height;const cx=(e.clientX-rect.left)*sx,cy=(e.clientY-rect.top)*sy;
    const log=logR.current;const frame=log[Math.min(fIdxR.current,log.length-1)];if(!frame)return;
    let best=null,bestD=Infinity;for(const s of frame.sk){const d=Math.hypot(cx-s.x*c.width,cy-s.y*c.height);if(d<bestD&&d<65){best=s;bestD=d}}setSel(best);
  },[started]);

  const evC=ev=>ev.t==="ext"?"#F43F5E":ev.t==="cross"?"#A855F7":ev.t==="env"?"#10B981":ev.t==="paradigm"?"#FFD700":ev.t==="mut"?(ev.d||0)>0?"#4ade80":"#f87171":"#888";
  const evI=ev=>ev.t==="ext"?"\uD83D\uDC80":ev.t==="cross"?"\uD83E\uDDEC":ev.t==="paradigm"?"\uD83C\uDF0A":ev.t==="env"?"\uD83C\uDF0D":ev.t==="mut"?(ev.d||0)>0?"\u26A1":"\uD83D\uDCC9":"\u2022";

  return(
    <div style={{width:"100%",height:"100vh",background:"#04040c",display:"flex",flexDirection:"column",fontFamily:'"JetBrains Mono",monospace',color:"#ccc",overflow:"hidden",position:"relative"}}>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet"/>
      {err&&<div style={{position:"absolute",top:0,left:0,right:0,padding:10,background:"#2a0808",color:"#F43F5E",fontSize:10,zIndex:100,textAlign:"center"}}>{err}<span onClick={()=>setErr(null)} style={{cursor:"pointer",marginLeft:12}}>x</span></div>}
      <div style={{flex:1,position:"relative",overflow:"hidden"}}>
        <canvas ref={cvs} onClick={onClick} style={{width:"100%",height:"100%",cursor:started?"crosshair":"default",display:"block"}}/>
        {started&&<div style={{position:"absolute",top:8,right:8,width:180,background:"rgba(6,6,18,0.88)",borderRadius:7,border:"1px solid #1e1e30",padding:7,backdropFilter:"blur(8px)"}}>
          <div style={{fontSize:8,color:"#A855F7",fontWeight:700,marginBottom:4,letterSpacing:2}}>LEADERBOARD</div>
          {lb.map((s,i)=><div key={s.id} style={{display:"flex",justifyContent:"space-between",fontSize:7,padding:"1px 0",color:i===0?"#FFD700":i<3?"#aaa":"#555",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.03)"}} onClick={()=>setSel(s)}><span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:5,height:5,borderRadius:"50%",background:CC[s.c],display:"inline-block"}}/>{s.s}</span><span style={{fontWeight:600}}>{s.f.toFixed(3)}</span></div>)}
        </div>}
        {started&&evts.length>0&&<div style={{position:"absolute",bottom:52,right:8,width:200,maxHeight:150,overflow:"hidden",background:"rgba(6,6,18,0.8)",borderRadius:7,border:"1px solid #151525",padding:6,backdropFilter:"blur(6px)"}}>
          <div style={{fontSize:7,color:"#444",marginBottom:2,letterSpacing:1}}>EVENTS</div>
          {evts.slice(0,7).map((ev,i)=><div key={i} style={{fontSize:6.5,padding:"0.5px 0",color:evC(ev),opacity:1-i*0.12}}>{evI(ev)} <span style={{color:"#555"}}>g{(ev.g||0).toLocaleString()}</span> {ev.sk?.split("-")[0]} {ev.af?.toFixed(3)}</div>)}
        </div>}
        {sel&&started&&<div style={{position:"absolute",bottom:52,left:8,width:240,background:"rgba(6,6,18,0.92)",borderRadius:7,border:`1.5px solid ${CC[sel.c]||"#333"}`,padding:9,backdropFilter:"blur(10px)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:10,fontWeight:700,color:CC[sel.c]}}>{sel.id}</span><span onClick={()=>setSel(null)} style={{cursor:"pointer",color:"#444",fontSize:12}}>x</span></div>
          <div style={{fontSize:7,color:"#555",marginTop:2}}>Category: {sel.c}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"2px 8px",marginTop:5,fontSize:8}}>
            <div><span style={{color:"#444"}}>Fitness </span><span style={{color:"#fff",fontWeight:600}}>{sel.f.toFixed(4)}</span></div>
            <div><span style={{color:"#444"}}>Born </span><span style={{color:"#fff"}}>Gen {sel.b.toLocaleString()}</span></div>
            <div><span style={{color:"#444"}}>Mutations </span><span style={{color:"#fff"}}>{sel.m}</span></div>
            <div><span style={{color:"#444"}}>Age </span><span style={{color:"#fff"}}>{(gen-sel.b).toLocaleString()}</span></div>
          </div>
          {sel.pA&&<div style={{fontSize:7,color:"#A855F7",marginTop:4}}>Lineage: {sel.pA.split("-")[0]} x {sel.pB.split("-")[0]}</div>}
        </div>}
        {llm&&<div style={{position:"absolute",top:8,left:"50%",transform:"translateX(-50%)",background:"rgba(8,8,20,0.92)",border:`1px solid ${llm._fallback?"#F59E0B":llm.provider==="synthetic"?"#A855F7":"#FFD700"}`,borderRadius:7,padding:"5px 12px",fontSize:9,color:llm._fallback?"#F59E0B":llm.provider==="synthetic"?"#A855F7":"#FFD700",backdropFilter:"blur(8px)",maxWidth:"80%"}}>{JUDGE_PROVIDERS[llm.provider]?.name||"Judge"}{llm._fallback?" (synthetic fallback)":""} @ Gen {llm.gen.toLocaleString()}: <span style={{fontWeight:700}}>{llm.score}</span> — {llm.note}</div>}
      </div>
      <div style={{height:48,background:"rgba(6,6,18,0.96)",borderTop:"1px solid #151525",display:"flex",alignItems:"center",padding:"0 10px",gap:8,flexShrink:0,zIndex:10}}>
        {!started?<>
          <button onClick={start} style={{background:"linear-gradient(135deg,#A855F7,#EC4899)",color:"#fff",border:"none",borderRadius:6,padding:"7px 20px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>EVOLVE</button>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:8}}><label style={{color:"#444"}}>SEED</label><input type="number" value={seed} onChange={e=>setSeed(+e.target.value)} style={{width:50,background:"#080818",border:"1px solid #1e1e30",borderRadius:3,color:"#fff",padding:"2px 4px",fontSize:8,fontFamily:"inherit"}}/></div>
          <div style={{display:"flex",alignItems:"center",gap:5,fontSize:8}}><label style={{color:"#444"}}>GENS</label><select value={total} onChange={e=>setTotal(+e.target.value)} style={{background:"#080818",border:"1px solid #1e1e30",borderRadius:3,color:"#fff",padding:"2px 4px",fontSize:8,fontFamily:"inherit"}}>{[100,500,1000,2000,5000,10000].map(v=><option key={v} value={v}>{v.toLocaleString()}</option>)}</select></div>
          <button onClick={()=>setCfg(!cfg)} style={{background:"#0b0b1a",border:"1px solid #1e1e30",borderRadius:4,padding:"4px 8px",fontSize:8,color:"#555",cursor:"pointer",fontFamily:"inherit"}}>{cfg?"HIDE":"CONFIG"}</button>
          <button onClick={()=>setSeed(Math.floor(Math.random()*99999))} style={{background:"#0b0b1a",border:"1px solid #1e1e30",borderRadius:4,padding:"4px 8px",fontSize:8,color:"#A855F7",cursor:"pointer",fontFamily:"inherit"}}>RANDOM</button>
        </>:<>
          <button onClick={()=>{const n=!playing;setPlaying(n);pR.current=n}} style={{background:playing?"#1a1a2a":"linear-gradient(135deg,#A855F7,#EC4899)",color:"#fff",border:"none",borderRadius:4,padding:"5px 14px",fontSize:9,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{playing?"PAUSE":"PLAY"}</button>
          <div style={{display:"flex",alignItems:"center",gap:4,fontSize:8}}><span style={{color:"#444"}}>SPEED</span><input type="range" min={1} max={80} value={speed} onChange={e=>{setSpeed(+e.target.value);spR.current=+e.target.value}} style={{width:60,accentColor:"#A855F7"}}/><span style={{color:"#A855F7",fontWeight:600,width:22,fontSize:7}}>{speed}x</span></div>
          <button onClick={()=>{const c=cvs.current;if(c){for(let i=0;i<80;i++)parts.current.push(mkP(c.width/2,c.height/2,"rgba(255,40,40,1)",55))}pE()}} style={{background:"#180808",border:"1px solid rgba(244,63,94,0.2)",borderRadius:4,padding:"4px 8px",fontSize:8,color:"#F43F5E",cursor:"pointer",fontFamily:"inherit"}}>CATACLYSM</button>
          <button onClick={runJ} disabled={llmL} style={{background:"#080818",border:"1px solid rgba(255,215,0,0.25)",borderRadius:"4px 0 0 4px",padding:"4px 8px",fontSize:8,color:llmL?"#444":"#FFD700",cursor:llmL?"wait":"pointer",fontFamily:"inherit"}}>{llmL?"Judging...":(jProv==="synthetic"?"Synthetic Judge":JUDGE_PROVIDERS[jProv]?.name||"Judge")}</button>
          <button onClick={()=>setJPanel(!jPanel)} style={{background:"#080818",border:"1px solid rgba(255,215,0,0.25)",borderLeft:"none",borderRadius:"0 4px 4px 0",padding:"4px 5px",fontSize:8,color:"#FFD700",cursor:"pointer",fontFamily:"inherit"}}>{jPanel?"\u25B2":"\u25BC"}</button>
          <div style={{marginLeft:"auto",fontSize:8,color:"#444"}}><span style={{color:"#A855F7",fontWeight:600}}>{gen.toLocaleString()}</span>/{total.toLocaleString()}</div>
          <button onClick={()=>{setStarted(false);setPlaying(false);pR.current=false;logR.current=null;evtR.current=[];parts.current=[];gR.current=0;fIdxR.current=0;setGen(0);setEvts([]);setSel(null);setLlm(null);setLb([])}} style={{background:"#0b0b1a",border:"1px solid #1e1e30",borderRadius:4,padding:"4px 8px",fontSize:8,color:"#555",cursor:"pointer",fontFamily:"inherit"}}>RESET</button>
        </>}
      </div>
      {cfg&&!started&&<div style={{position:"absolute",bottom:52,left:10,background:"rgba(6,6,18,0.96)",border:"1px solid #1e1e30",borderRadius:7,padding:12,width:240,backdropFilter:"blur(10px)",zIndex:20}}>
        <div style={{fontSize:9,color:"#A855F7",fontWeight:700,marginBottom:7,letterSpacing:1}}>PARAMETERS</div>
        <div style={{display:"grid",gap:7,fontSize:8}}>
          {[{l:"Mutation Rate",v:mR,set:setMR,min:0.05,max:0.9,step:0.05},{l:"Selection Pressure",v:sP,set:setSP,min:0.05,max:0.5,step:0.05}].map(p=><div key={p.l}><div style={{display:"flex",justifyContent:"space-between",color:"#555"}}><span>{p.l}</span><span style={{color:"#fff"}}>{p.v.toFixed(2)}</span></div><input type="range" min={p.min} max={p.max} step={p.step} value={p.v} onChange={e=>p.set(+e.target.value)} style={{width:"100%",accentColor:"#A855F7"}}/></div>)}
          <div><div style={{display:"flex",justifyContent:"space-between",color:"#555"}}><span>Catastrophe Every</span><span style={{color:"#fff"}}>{cF} gens</span></div><input type="range" min={10} max={200} step={5} value={cF} onChange={e=>setCF(+e.target.value)} style={{width:"100%",accentColor:"#F43F5E"}}/></div>
        </div>
        <div style={{fontSize:6,color:"#333",marginTop:6}}>Red Queen decay prevents convergence. Paradigm shifts reset landscape every 800-2000 gens. 2% innovation burst chance.</div>
      </div>}
      {jPanel&&started&&<div style={{position:"absolute",bottom:52,left:"50%",transform:"translateX(-50%)",background:"rgba(6,6,18,0.96)",border:"1px solid rgba(255,215,0,0.2)",borderRadius:7,padding:12,width:320,backdropFilter:"blur(10px)",zIndex:25}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}><span style={{fontSize:9,color:"#FFD700",fontWeight:700,letterSpacing:1}}>JUDGE SETTINGS</span><span onClick={()=>setJPanel(false)} style={{cursor:"pointer",color:"#444",fontSize:10}}>x</span></div>
        <div style={{display:"grid",gap:8,fontSize:8}}>
          <div>
            <div style={{color:"#555",marginBottom:3}}>Provider</div>

              {Object.entries(JUDGE_PROVIDERS).map(([k,v])=><button key={k} onClick={()=>setJProv(k)} style={{background:jProv===k?"rgba(255,215,0,0.15)":"#080818",border:`1px solid ${jProv===k?"#FFD700":"#1e1e30"}`,borderRadius:4,padding:"3px 8px",fontSize:7,color:jProv===k?"#FFD700":"#555",cursor:"pointer",fontFamily:"inherit"}}>{v.name}</button>)}
            </div>

            <div style={{fontSize:6,color:"#333",marginTop:2}}>Stored in localStorage. Never sent to our servers.</div>
          </div>}
          {(jProv==="custom"||jProv==="ollama"||jProv==="lmstudio")&&<div>
            <div style={{color:"#555",marginBottom:3}}>{jProv==="custom"?"API Endpoint (OpenAI-compatible)":jProv==="ollama"?"Ollama Endpoint":"LM Studio Endpoint"}</div>
            <input type="text" value={jEndpoint} onChange={e=>setJEndpoint(e.target.value)} placeholder={jProv==="ollama"?"http://localhost:11434/v1/chat/completions":jProv==="lmstudio"?"http://localhost:1234/v1/chat/completions":"https://your-api.com/v1/chat/completions"} style={{width:"100%",background:"#080818",border:"1px solid #1e1e30",borderRadius:3,color:"#fff",padding:"4px 6px",fontSize:8,fontFamily:"inherit"}}/>
            <div style={{fontSize:6,color:"#333",marginTop:2}}>Leave blank for default. Override only if using a non-standard port.</div>
          </div>}
          <div style={{fontSize:6,color:"#333",borderTop:"1px solid #151525",paddingTop:5}}>
            <b style={{color:"#555"}}>Synthetic</b> — Free, instant, algorithmic scoring. No API needed.<br/>
            <b style={{color:"#555"}}>Claude / GPT</b> — Real LLM evaluation via API. ~$0.001/judgment.<br/>
            <b style={{color:"#555"}}>Groq / Together</b> — Fast inference APIs (Llama 3.3 70B). Requires API key.<br/>
            <b style={{color:"#555"}}>Ollama / LM Studio</b> — Local LLM. Free, private, no API key needed.<br/>
            <b style={{color:"#555"}}>Custom</b> — Any OpenAI-compatible endpoint (vLLM, text-gen-webui, etc).<br/>
            <span style={{color:"#444",marginTop:2,display:"block"}}>All providers gracefully fall back to synthetic scoring if parse fails.</span>
          </div>
        </div>
      </div>}
      {!started&&<div style={{position:"absolute",top:8,right:8,background:"rgba(6,6,18,0.85)",border:"1px solid #151525",borderRadius:7,padding:7,width:180,backdropFilter:"blur(6px)"}}>
        <div style={{fontSize:7,color:"#444",letterSpacing:1,marginBottom:4}}>NOTABLE SEEDS</div>
        {[{s:42,d:"Classic balanced arc"},{s:137,d:"Paradigm shock at 3K"},{s:2025,d:"Triple extinction cascade"},{s:7777,d:"Late comeback at 8K"},{s:1337,d:"15+ lead changes"},{s:9999,d:"Stable then 7K collapse"}].map(({s,d})=><div key={s} onClick={()=>setSeed(s)} style={{fontSize:7,padding:"1.5px 0",cursor:"pointer",color:seed===s?"#A855F7":"#555",display:"flex",justifyContent:"space-between",borderBottom:"1px solid rgba(255,255,255,0.02)"}}><span style={{fontWeight:600}}>#{s}</span><span style={{fontSize:6,color:"#333"}}>{d}</span></div>)}
      </div>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));

  </script>
